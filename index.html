---
layout: page
permalink: /
---

{% assign archive_posts = site.posts | sort: "date" | reverse %}
<div class="minimal-home">
  <header class="minimal-intro">
    <h1 class="minimal-name">{{ site.title }}</h1>
    <p class="minimal-bio">{{ site.tagline }}</p>
  </header>

  <section class="minimal-posts">
        {% for post in archive_posts %}
      <article class="minimal-post">
        <a class="minimal-link" href="{{ post.url | relative_url }}">
          <span class="minimal-date">{{ post.date | date: "%Y-%m-%d" }}</span>
          <span class="minimal-title">{{ post.title }}</span>
            </a>
          </article>
        {% endfor %}
    </section>
        </div>
